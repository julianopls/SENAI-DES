<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark" style="background-color: rgb(4, 4, 73);">
        <div class="container">
            <a class="navbar-brand" href="#">Locadora</a>
        </div>
    </nav>

    <header class="bg-dark text-white text-center py-4 mb-4">
        <div class="container">
            <h1 class="fw-light">Cadastro de Filmes</h1>
            <button class="btn btn-success mt-2">+ Novo Filme</button>
        </div>
    </header>

    <main class="container">
        <table class="table table-striped table-bordered text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>Capa</th>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>
                        <img src="https://m.media-amazon.com/images/I/61bKyHqoiNL._AC_UF894,1000_QL80_.jpg" width="60">
                    </td>
                    <td>American Pie 2 - A Segunda Vez é Ainda Melhor</td>
                    <td>J. B. Rogers</td>
                    <td>Comédia</td>
                    <td>2001</td>
                    <td>
                        <button class="btn btn-danger btn-sm">Remover</button>
                    </td>
                </tr>
            </tbody>

        </table>

    </main>

</body>

</html>
